spring:
  application:
    name: card-management-system

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/card_db}
    username: ${SPRING_DATASOURCE_USERNAME:card_user}
    password: ${SPRING_DATASOURCE_PASSWORD:card_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml
    default-schema: public

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /

# Настройки приложения
app:
  jwt:
    secret: "mySecretKey12345678901234567890123456789012345678901234567890123456789012345678901234567890"
    expiration-ms: 86400000
    issuer: "bank-cards-api"

# Swagger / OpenAPI
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

# Логирование
logging:
  level:
    nikita.com.bankcards: INFO
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
